services:
  - type: web
    name: spreadbot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py --mode paper
    healthCheckPath: /api/state
    envVars:
      - key: BOT_MODE
        value: paper
      - key: DASHBOARD_HOST
        value: 0.0.0.0
      - key: DB_PATH
        value: /data/spreadbot.db
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "true"
      # Solana public RPC — no key needed
      - key: SOLANA_WS_URL
        value: wss://api.mainnet-beta.solana.com
      - key: ETH_WS_URL
        value: wss://rpc.ankr.com/eth/ws
      - key: ARB_WS_URL
        value: wss://rpc.ankr.com/arbitrum/ws
      - key: BSC_WS_URL
        value: wss://rpc.ankr.com/bsc/ws
      # BINANCE_API_KEY / BINANCE_API_SECRET not needed for paper trading

    disk:
      name: spreadbot-data
      mountPath: /data
      sizeGB: 1
